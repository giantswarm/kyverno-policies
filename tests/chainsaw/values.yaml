# Values for testing Kyverno policies with Chainsaw
# Set all policies to Enforce mode so tests can verify blocking behavior

kyverno-policies:
  validationFailureAction: Enforce

# Best practices policies
bestPracticesPolicies:
  policies:
    disallow-latest-tag:
      enabled: true
      mode: Enforce
    prevent-bare-pods:
      enabled: true
      mode: Enforce
    require-emptydir-requests-and-limits:
      enabled: true
      mode: Enforce

# Supplemental security policies
supplementalSecurityPolicies:
  policies:
    disallow-gitrepo-volume:
      enabled: true
      mode: Enforce
    restrict-external-ips:
      enabled: true
      mode: Enforce

# Debug access policies
debugAccessPolicies:
  authorizedDebugTargets:
  - namespaces: ["debug-access-test"]
    allDeployments: true
    allowedDebugContainerImages: ["busybox:*"]
  policies:
    block-expired-exceptions:
      enabled: true
      mode: Enforce
    disallow-ephemeral-containers:
      enabled: true
      mode: Enforce
    disallow-unapproved-debug-access:
      enabled: true
      mode: Enforce
    purge-expired-exceptions:
      enabled: true
      mode: Enforce
      cleanupSchedule: "*/5 * * * *"
      targetAnnotation: "policy.giantswarm.io/exception-expires-at"
