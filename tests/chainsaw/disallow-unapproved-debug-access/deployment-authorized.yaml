apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-target
  namespace: debug-access-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug-target
  template:
    metadata:
      labels:
        app: debug-target
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: main
        image: busybox:1.35
        command: ["sh", "-c", "sleep 3600"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 25m
            memory: 40Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
