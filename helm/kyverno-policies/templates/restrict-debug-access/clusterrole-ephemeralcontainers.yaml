{{- $disallowEphemeral := and (hasKey .Values.debugAccessPolicies.policies "disallow-ephemeral-containers") (get .Values.debugAccessPolicies.policies "disallow-ephemeral-containers").enabled -}}
{{- $disallowUnapproved := and (hasKey .Values.debugAccessPolicies.policies "disallow-unapproved-debug-access") (get .Values.debugAccessPolicies.policies "disallow-unapproved-debug-access").enabled -}}
{{- if or $disallowEphemeral $disallowUnapproved }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:admission-controller:disallow-unapproved-debug-access:ephemeralcontainers
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
rules:
  - apiGroups:
      - ""
    resources:
      - pods/ephemeralcontainers
    verbs:
      - get
      - list
      - watch
{{- end }}
