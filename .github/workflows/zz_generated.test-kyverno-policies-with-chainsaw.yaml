name: "Test Kyverno Policies with Chainsaw"
on:
  pull_request: {}
  merge_group: {}
  workflow_dispatch: {}
env:
  KYVERNO_POLICIES_APP_NAME: kyverno-policies
  # repository: kubernetes-sigs/kind
  KIND_VERSION: v0.25.0
  # repository: kindest/node
  KUBERNETES_VERSION: v1.33.7
  # repository: giantswarm/kyverno-crds
  KYVERNO_VERSION: v1.16.0
  HELM_VERSION: 4

permissions: {}

jobs:
  test-policies:
    name: "Test Kyverno Policies"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15
      - name: Download kind
        run: |
          curl -sLo kind https://github.com/kubernetes-sigs/kind/releases/download/$KIND_VERSION/kind-linux-amd64 && chmod +x kind && sudo mv kind /usr/bin
      - name: Download kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - name: Download Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-$HELM_VERSION && chmod +x get_helm.sh && ./get_helm.sh
      - name: Install Make
        run: |
          sudo apt-get update && sudo apt-get install make
      - name: Create kind cluster and install kyverno
        run: |
          make kind-create kind-get-kubeconfig install-kyverno
      - name: Install extra resources
        run: |
          make install-extras
      - name: Install Kyverno Policies
        run: |
          make install-policies
      - name: Run Chainsaw tests
        run: |
          chainsaw test ./tests/chainsaw